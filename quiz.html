  <h1>Game Begins</h1>

  <p id="question"></p>

  <form onsubmit="checkAnswer(event)">
    <label for="answer">Quiz answer:</label><br>
    <input type="text" id="answer" name="answer"><br>
    <input type="submit" value="Submit">
  </form>

  <script>

    var questions = [
      { question: "What form do employers use to report your wages?", answer: "w2" },
      { question: "What is the deadline to file federal taxes?", answer: "april 15" },
      { question: "What does IRS stand for?", answer: "internal revenue service" }
    ];

    var current = questions[Math.floor(Math.random() * questions.length)];
    document.getElementById("question").textContent = current.question;

    function checkAnswer(event) {
      event.preventDefault();
      var answer = document.getElementById("answer").value.trim().toLowerCase();

      if (answer === current.answer) {
        alert("Correct!");
        current = questions[Math.floor(Math.random() * questions.length)];
        document.getElementById("question").textContent = current.question;
        document.getElementById("answer").value = "";
      } else {
        alert("Incorrect, try again.");
      }
    }

  </script>

</body>
